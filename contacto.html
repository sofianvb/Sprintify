<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprintify - Perfil y Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div id="mapa-bg"></div>

    <main class="container position-relative z-1" style="margin-top: 5vh; padding-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card-registro p-4 shadow-lg">
                    <h3 class="text-center mb-4 fw-bold text-white">Configurar Perfil</h3>
                    
                    <form id="formRegistro" novalidate>
                        <div class="mb-3">
                            <label for="nombre" class="form-label text-white">Nombre completo</label>
                            <input type="text" class="form-control" id="nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label text-white">Correo electrónico</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label for="edad" class="form-label text-white">Edad</label>
                                <input type="number" class="form-control" id="edad" min="16" max="99" required>
                                <div class="invalid-feedback">Debes ser mayor de 16 años.</div>
                            </div>
                            <div class="col-6 mb-3">
                                <label for="nivel" class="form-label text-white">Nivel</label>
                                <select class="form-select" id="nivel" required>
                                    <option value="" selected disabled>Elige...</option>
                                    <option value="1">Principiante (5k)</option>
                                    <option value="2">Intermedio (10k)</option>
                                    <option value="3">Avanzado (21k+)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label text-white">Contraseña</label>
                            <input type="password" class="form-control" id="password" required minlength="6">
                            <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
                        </div>

                        <button type="submit" class="btn w-100 fw-bold rounded-pill mt-2" style="background-color: #e0ff00; color: #000;">Guardar Perfil</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom bottom-nav z-3">
        <div class="container">
            <div class="row text-center justify-content-center">
                <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-around">
                    <a href="index.html" class="nav-icon">
                        <i class="bi bi-house-door-fill fs-4"></i>
                        <span>Inicio</span>
                    </a>
                    <a href="crear.html" class="nav-icon">
                        <i class="bi bi-plus-circle-fill fs-1" style="color: #e0ff00; margin-top: -15px;"></i>
                    </a>
                    <a href="contacto.html" class="nav-icon active">
                        <i class="bi bi-person-fill fs-4"></i>
                        <span>Perfil</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/validacion.js"></script>
</body>
</html>
