<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprintify - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div id="mapa-bg"></div>

    <div class="container mt-4 position-relative z-1">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="top-search-bar d-flex align-items-center">
                    <i class="bi bi-search me-2 text-muted"></i>
                    <input type="text" placeholder="Madrid Centro">
                    <i class="bi bi-sliders ms-2 text-muted"></i>
                </div>
            </div>
        </div>
    </div>

    <main class="container position-relative z-1" style="margin-top: 50vh; padding-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4" id="lista-carreras">
                <div class="text-center mt-5 text-white">
                    <div class="spinner-border text-light" role="status"></div>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom bottom-nav z-3">
        <div class="container">
            <div class="row text-center justify-content-center">
                <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-around">
                    <a href="index.html" class="nav-icon active">
                        <i class="bi bi-house-door-fill fs-4"></i>
                        <span>Inicio</span>
                    </a>
                    <a href="crear.html" class="nav-icon">
                        <i class="bi bi-plus-circle-fill fs-1" style="color: #e0ff00; margin-top: -15px;"></i>
                    </a>
                    <a href="contacto.html" class="nav-icon">
                        <i class="bi bi-person-fill fs-4"></i>
                        <span>Perfil</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/viewmodel/carrerasViewModel.js"></script>
</body>
</html>
