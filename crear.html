<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprintify - Crear Carrera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div id="mapa-bg"></div>

    <main class="container position-relative z-1" style="margin-top: 10vh; padding-bottom: 80px;">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6">
                <div class="card-registro p-4 shadow-lg">
                    <h3 class="text-center mb-4 fw-bold text-white">Crear Nueva Carrera</h3>
                    
                    <form id="formCrear" novalidate>
                        <div class="mb-3">
                            <label for="nombreCarrera" class="form-label text-white">Nombre del Evento</label>
                            <input type="text" class="form-control" id="nombreCarrera" placeholder="Ej. Media Maratón de Madrid" required>
                            <div class="invalid-feedback">Debes introducir un nombre válido.</div>
                        </div>

                        <div class="mb-3">
                            <label for="distancia" class="form-label text-white">Distancia</label>
                            <input type="text" class="form-control" id="distancia" placeholder="Ej. 10 KM" required>
                        </div>

                        <div class="mb-3">
                            <label for="ubicacion" class="form-label text-white">Ubicación</label>
                            <input type="text" class="form-control" id="ubicacion" placeholder="Ej. Parque del Retiro" required>
                        </div>

                        <button type="submit" class="btn w-100 fw-bold rounded-pill mt-3" style="background-color: #e0ff00; color: #000;">Publicar Carrera</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <nav class="fixed-bottom bottom-nav z-3">
        <div class="container">
            <div class="row text-center justify-content-center">
                <div class="col-12 col-md-6 col-lg-4 d-flex justify-content-around">
                    <a href="index.html" class="nav-icon">
                        <i class="bi bi-house-door-fill fs-4"></i>
                        <span>Inicio</span>
                    </a>
                    <a href="crear.html" class="nav-icon active">
                        <i class="bi bi-plus-circle-fill fs-1" style="color: #e0ff00; margin-top: -15px;"></i>
                    </a>
                    <a href="contacto.html" class="nav-icon">
                        <i class="bi bi-person-fill fs-4"></i>
                        <span>Perfil</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formCrear').addEventListener('submit', function(event) {
            event.preventDefault();
            event.stopPropagation();
            if (!this.checkValidity()) {
                this.classList.add('was-validated');
            } else {
                alert('¡Carrera creada con éxito! El evento ya está disponible en Sprintify.');
                window.location.href = 'index.html'; 
            }
        });
    </script>
</body>
</html>
